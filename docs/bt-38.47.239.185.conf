server
{
    listen 8081;
    server_name 38.47.239.185;
    index index.php index.html index.htm;
    root /data/www/douyin/php/public;

    include /www/server/panel/vhost/nginx/well-known/38.47.239.185.conf;

    location / {
        try_files $uri $uri/ /index.php$uri?$query_string;
    }

    # PHP handler
    location ~ [^/]\.php(/|$)
    {
        try_files $uri =404;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi.conf;
        include pathinfo.conf;
    }

    #ERROR-PAGE-START
    error_page 404 /404.html;
    #ERROR-PAGE-END

    # 禁止访问的敏感文件
    location ~* (\.user.ini|\.htaccess|\.env$|\.project|\.git|\.svn|\.bzr|\.DS_Store|composer\.json|composer\.lock|package(-lock)?\.json|yarn\.lock|pnpm-lock\.yaml)
    {
        return 404;
    }

    location ~ .*\.(gif|jpg|jpeg|png|bmp|swf)$
    {
        expires 30d;
        error_log /dev/null;
        access_log /dev/null;
    }

    location ~ .*\.(js|css)?$
    {
        expires 12h;
        error_log /dev/null;
        access_log /dev/null;
    }

    access_log /www/wwwlogs/38.47.239.185.log;
    error_log /www/wwwlogs/38.47.239.185.error.log;
}
